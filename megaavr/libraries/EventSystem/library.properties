paragraph=Six ready-made connections (EventSystem..EventSystem5) carry one source each - an Arduino pin, the AnalogComp result, a CustomLogic output, or a software trigger() - to any number of destinations: the board's fixed event-output pins or the CustomLogic event inputs. Clean-room implementation from DS40002548A section 16 only.
