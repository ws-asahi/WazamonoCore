sentence=Easy hardware logic gates (CCL) for the Wazamono boards.
paragraph=Pre-instantiated CustomLogic units turn the Configurable Custom Logic look-up tables into AND/OR/XOR/NAND/NOR/XNOR/NOT gates - or any 3-input truth table - on fixed, board-appropriate pins. The gate keeps working with zero CPU involvement, and attachInterrupt-style callbacks fire when the output changes.
