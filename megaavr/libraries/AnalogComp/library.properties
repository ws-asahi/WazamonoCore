sentence=Easy analog comparator (AC0) for the Wazamono boards.
paragraph=A single AnalogComp object compares the plus input pin against the minus input pin or an internal reference voltage, with optional hysteresis, an output on PA7, and attachInterrupt-style callbacks. Fixed, board-appropriate default pins make it as easy to use as Serial or SD.
