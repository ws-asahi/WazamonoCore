# WazamonoCore — Compile Examples
#
# Lean regression CI for the three Wazamono boards. Replaces the DxCore
# multi-family (Dx/Ex/DU) matrix, which tested dozens of non-existent parts.
#
# How it works:
#   1. The Wazamono package index installs the WazamonoCore toolchain
#      (avr-gcc 15.2.0-wazamono1, avrdude 8.1-wazamono1) + the released
#      platform, so ctags and other builtin tools are also pulled in.
#   2. `source-path: megaavr` then overlays the checked-out working tree on
#      top, so the examples are compiled against the code in this commit/PR.
#
# To broaden/narrow coverage, edit the `sketch-paths` list. Each entry is a
# directory; every .ino under it is compiled.

name: Compile Examples

on:
  push:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "megaavr/libraries/**"
      - "megaavr/cores/**"
      - "megaavr/variants/**"
      - "megaavr/*.txt"
  pull_request:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "megaavr/libraries/**"
      - "megaavr/cores/**"
      - "megaavr/variants/**"
      - "megaavr/*.txt"
  workflow_dispatch:

jobs:
  compile-examples:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - board: "Wazamono Tachi (AVR64DU32)"
            fqbn: "WazamonoCore:megaavr:wazamonotachi:clock=24internal"
          - board: "Wazamono Tsurugi (AVR64DU32)"
            fqbn: "WazamonoCore:megaavr:wazamonotsurugi:clock=24internal"
          - board: "Wazamono Kunai (AVR32DU20)"
            fqbn: "WazamonoCore:megaavr:wazamonokunai"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compile examples (${{ matrix.board }})
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.fqbn }}
          sketch-paths: |
            - megaavr/libraries/EEPROM/examples
            - megaavr/libraries/USERSIG/examples
            - megaavr/libraries/EventSystem/examples
            - megaavr/libraries/CustomLogic/examples
            - megaavr/libraries/AnalogComp/examples
            - megaavr/libraries/Wire/examples
            - megaavr/libraries/SPI/examples
            - megaavr/libraries/Servo/examples
            - megaavr/libraries/tinyNeoPixel_Static/examples
            - megaavr/libraries/SoftwareSerial/examples
            - megaavr/libraries/HID-Project/examples
            - megaavr/libraries/MIDIUSB/examples
          platforms: |
            # Pull the WazamonoCore toolchain + released platform (also
            # provides builtin tools such as ctags).
            - source-url: https://wazamono.ws-asahi.net/ws-asahi/WazamonoCore/main/docs/package_wazamono_index.json
              name: WazamonoCore:megaavr
            # Overlay the working tree so this commit's code is what gets built.
            - source-path: megaavr
              name: WazamonoCore:megaavr
          libraries: |
            # Examples have no external library dependencies.
            -
          verbose: false
